amcl:
  ros__parameters:
    use_sim_time: false

    # Topics (should match what Team 1 provides + robot frames)
    scan_topic: scan
    odom_frame_id: odom
    base_frame_id: base_link
    global_frame_id: map

    # Particle filter parameters
    # TODO: Set min_particles and max_particles (balance accuracy vs performance)
    min_particles: <FILL_IN>
    max_particles: <FILL_IN>
    update_min_d: 0.2      # Distance threshold before filter updates
    update_min_a: 0.2      # Angular threshold before filter updates

    # Laser model (controls how sensor data is trusted)
    # TODO: Tune z_hit, z_rand, sigma_hit for our lidar
    laser_max_range: 12.0
    laser_min_range: 0.1
    laser_z_hit: <FILL_IN>
    laser_z_rand: <FILL_IN>
    laser_sigma_hit: <FILL_IN>

    # Odometry model (diff drive, skid-steer)
    # TODO: Adjust alphas to match Scout Mini wheel slip/odometry noise
    odom_alpha1: <FILL_IN>
    odom_alpha2: <FILL_IN>
    odom_alpha3: <FILL_IN>
    odom_alpha4: <FILL_IN>
    odom_model_type: "diff"

    # Initial pose covariance
    initial_pose_x: 0.0
    initial_pose_y: 0.0
    initial_pose_a: 0.0
    set_initial_pose: false
    always_reset_initial_pose: false
